# ==============================================================================
# CI - Unit Tests
# ==============================================================================
# Runs the module's PHPUnit unit test suite on every pull request and on pushes
# to master. The tests run in isolation (no full Magento install) via the
# stub-backed bootstrap in Test/bootstrap.php.
# ==============================================================================

name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, dom, libxml, tokenizer, xml, xmlwriter, simplexml, curl, intl
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php-version }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit --colors=never
